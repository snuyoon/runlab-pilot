# XcodeGen 프로젝트 정의 — `xcodegen generate` 실행 시 RunLab.xcodeproj 생성
name: RunLab
options:
  bundleIdPrefix: com.snuyoon
  deploymentTarget:
    iOS: "18.0"
targets:
  RunLab:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: RunLab
    info:
      path: RunLab/Info.plist
      properties:
        CFBundleDisplayName: RunLab
        # AlarmKit 필수 키 — 없으면 알람 예약 불가 (entitlement는 필요 없음)
        NSAlarmKitUsageDescription: "설정하신 시각에 기상 알람을 울리기 위해 필요합니다."
        # HealthKit — 가민 러닝 세션(거리·페이스·심박)을 Apple 건강에서 읽어오기 위함 (읽기 전용)
        NSHealthShareUsageDescription: "가민 워치의 러닝 기록(거리·페이스·심박)을 연구용으로 자동 수집하기 위해 건강 데이터 읽기 권한이 필요합니다."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: RunLab/RunLab.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snuyoon.runlab
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: C9UCX4Z9RZ  # sungjae yun (Personal Team) — xcodegen 재생성 시 서명 유지
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIUserInterfaceStyle: Light
